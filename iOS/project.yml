name: Grippulse
options:
  bundleIdPrefix: com.shimondeitel.grippulse
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Grippulse:
    type: application
    platform: iOS
    sources:
      - path: Grippulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grippulse
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Grippulse/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GrippulseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GrippulseTests
      - path: Grippulse.storekit
    dependencies:
      - target: Grippulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grippulse.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GrippulseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GrippulseUITests
    dependencies:
      - target: Grippulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grippulse.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Grippulse:
    build:
      targets:
        Grippulse: all
        GrippulseTests: [test]
        GrippulseUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Grippulse.storekit
    test:
      config: Debug
      storeKitConfiguration: Grippulse.storekit
      targets:
        - GrippulseTests
        - GrippulseUITests
    archive:
      config: Release
